<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 助手 (全模型+导出版)</title>
    <!-- 引入 Puter.js -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #10a37f; --bg-main: #f4f5f7; --bg-chat: #ffffff;
            --text-main: #333333; --border: #e0e0e0; --sidebar-bg: #202123;
            --sidebar-hover: #343541;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; background-color: var(--bg-main);
            color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 顶部导航栏 */
        header {
            height: 56px; background-color: var(--bg-chat); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 10; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 5px; }
        .menu-btn { font-size: 22px; background: none; border: none; padding: 5px; cursor: pointer; color: #333; }
        .app-title { font-weight: bold; font-size: 16px; margin-left: 2px;}
        
        .header-right { display:flex; gap:6px; align-items:center; }
        .model-select { padding: 5px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; outline: none; max-width: 120px; background: #fff;}
        .icon-btn { font-size: 14px; background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 5px; cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center;}
        .icon-btn:active { background: #f0f0f0; }
        .reset-btn { font-size: 12px; padding: 5px 8px; border-radius: 4px; background: #ff4d4f; color: white; border: none; cursor: pointer; }

        /* 侧边栏及遮罩 */
        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 260px; background-color: var(--sidebar-bg);
            color: #ececf1; z-index: 1000; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column;
        }
        #sidebar.open { transform: translateX(0); }
        #overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
            z-index: 999; opacity: 0; visibility: hidden; transition: opacity 0.3s;
        }
        #overlay.open { opacity: 1; visibility: visible; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; }
        .new-chat-btn {
            width: 100%; padding: 12px; background: transparent; border: 1px solid #555;
            color: #fff; border-radius: 6px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .new-chat-btn:active { background: var(--sidebar-hover); }
        #session-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .session-item {
            padding: 12px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 15px; color: #ccc;
        }
        .session-item.active { background-color: var(--sidebar-hover); color: #fff; font-weight: bold; }
        .session-item .title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; pointer-events: none; }
        .delete-btn { background: none; border: none; color: #ff6b6b; font-size: 16px; padding: 0 5px; }

        /* 聊天主区域 */
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-wrapper { display: flex; width: 100%; }
        .msg-wrapper.user { justify-content: flex-end; }
        .msg-bubble { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .msg-wrapper.user .msg-bubble { background-color: var(--primary); color: #fff; border-bottom-right-radius: 2px; }
        .msg-wrapper.ai .msg-bubble { background-color: var(--bg-chat); border: 1px solid var(--border); border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .sys-text { color: #d93025; font-size: 13px; margin-top: 5px; font-weight: bold; }

        /* 转圈圈加载特效 */
        .loading-container { display: flex; align-items: center; gap: 10px; color: #666; font-size: 14px; font-weight: 500; }
        .spinner {
            width: 18px; height: 18px; border: 2.5px solid #e0e0e0; border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 底部输入区 */
        footer { background-color: var(--bg-chat); border-top: 1px solid var(--border); padding: 10px 15px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0; }
        #user-input { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 10px 15px; font-size: 16px; max-height: 100px; outline: none; resize: none; font-family: inherit; background: var(--bg-main); }
        #user-input:focus { border-color: var(--primary); }
        #send-btn { background-color: var(--primary); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: 2px; cursor: pointer; transition: 0.2s; }
        #send-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        #send-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* 隐藏移动端原生 optgroup 默认样式过大问题，靠原生系统渲染 */
    </style>
</head>
<body>

    <!-- 侧边栏及遮罩 -->
    <div id="overlay" onclick="toggleSidebar(false)"></div>
    <div id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newSession()">➕ 新建会话</button>
        </div>
        <div id="session-list"></div>
    </div>

    <!-- 顶部导航 -->
    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar(true)">☰</button>
            <span class="app-title">AI</span>
        </div>
        <div class="header-right">
            <!-- 导出为 TXT 按钮 -->
            <button class="icon-btn" onclick="exportToTXT()" title="导出当前对话为TXT文件">📥</button>
            
            <!-- 分组全模型列表 -->
            <select id="model-select" class="model-select">
                <optgroup label="Gemini 3.1 系列">
                    <option value="gemini-3.1-pro-preview">3.1 Pro (推荐)</option>
                    <option value="gemini-3.1-flash-lite-preview">3.1 Flash Lite</option>
                </optgroup>
                <optgroup label="Gemini 3.0 系列">
                    <option value="gemini-3-pro-preview">3.0 Pro</option>
                    <option value="gemini-3-flash-preview">3.0 Flash</option>
                </optgroup>
                <optgroup label="Gemini 2.5 系列">
                    <option value="gemini-2.5-pro">2.5 Pro</option>
                    <option value="gemini-2.5-flash">2.5 Flash</option>
                    <option value="gemini-2.5-flash-lite">2.5 Flash Lite</option>
                    <option value="gemini-2.5-pro-preview">2.5 Pro 预览版</option>
                    <option value="gemini-2.5-pro-preview-05-06">2.5 Pro 0506</option>
                    <option value="gemini-2.5-flash-preview-09-2025">2.5 Flash 0925</option>
                    <option value="gemini-2.5-flash-lite-preview-09-2025">2.5 FlashLite 0925</option>
                </optgroup>
                <optgroup label="Gemini 2.0 系列">
                    <option value="gemini-2.0-flash">2.0 Flash</option>
                    <option value="gemini-2.0-flash-lite">2.0 Flash Lite</option>
                    <option value="gemini-2.0-flash-001">2.0 Flash 001</option>
                    <option value="gemini-2.0-flash-lite-001">2.0 FlashLite 001</option>
                </optgroup>
            </select>

            <button class="reset-btn" onclick="forceUnlock()">解锁</button>
        </div>
    </header>

    <!-- 聊天内容区 -->
    <div id="chat-container"></div>

    <!-- 底部输入区 -->
    <footer>
        <textarea id="user-input" rows="1" placeholder="输入消息..."></textarea>
        <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </footer>

<script>
    const STORAGE_KEY = 'v5_puter_sessions';
    let sessions = [];
    let currentSessionId = null;
    let isGenerating = false;

    const chatContainer = document.getElementById('chat-container');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const sessionListEl = document.getElementById('session-list');

    function generateUUID() {
        return 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    }

    function safeSliceTitle(text) {
        const chars = Array.from(text);
        if (chars.length <= 12) return text;
        return chars.slice(0, 12).join('') + '...';
    }

    function init() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) sessions = JSON.parse(raw);
        } catch (e) { sessions = []; }
        if (!Array.isArray(sessions)) sessions = [];

        currentSessionId = localStorage.getItem('v5_current_id');
        
        if (!sessions.find(s => s.id === currentSessionId)) {
            if (sessions.length > 0) {
                currentSessionId = sessions[0].id;
            } else {
                createEmptySession();
            }
        }
        renderSidebar();
        renderChat();
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
        localStorage.setItem('v5_current_id', currentSessionId);
    }

    function createEmptySession() {
        currentSessionId = generateUUID();
        sessions.unshift({ id: currentSessionId, title: '新会话', messages: [] });
        saveData();
    }

    function toggleSidebar(show) {
        if (show) { sidebar.classList.add('open'); overlay.classList.add('open'); }
        else { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
    }

    function forceUnlock() {
        isGenerating = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        alert("已强制解锁！您可以重新发送消息。");
    }

    // ==== 核心：一键导出为 TXT 功能 ====
    function exportToTXT() {
        const session = sessions.find(s => s.id === currentSessionId);
        if (!session || session.messages.length === 0) {
            alert("当前没有任何聊天记录可以导出！");
            return;
        }

        // 拼接纯文本内容
        let textContent = `==== 聊天记录 ====\n`;
        textContent += `会话标题: ${session.title}\n`;
        textContent += `导出时间: ${new Date().toLocaleString()}\n`;
        textContent += `==================\n\n`;

        session.messages.forEach(msg => {
            const roleName = msg.role === 'user' ? '👤 用户' : '🤖 AI助手';
            textContent += `\({roleName}:\n\){msg.content}\n\n`;
        });

        textContent += `==== 记录结束 ====\n`;

        // 创建下载链接
        const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        // 文件名过滤掉可能引起错误的特殊字符
        const safeTitle = session.title.replace(/[\\/:*?"<>|]/g, '_');
        a.download = `${safeTitle}.txt`;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function newSession() {
        isGenerating = false; 
        inputEl.disabled = false;
        sendBtn.disabled = false;
        createEmptySession(); 
        renderSidebar();
        renderChat();
        toggleSidebar(false); 
    }

    function switchSession(id) {
        currentSessionId = id;
        isGenerating = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        saveData();
        renderSidebar();
        renderChat();
        toggleSidebar(false);
    }

    function deleteSession(e, id) {
        e.stopPropagation();
        if(!confirm("确定删除此会话吗？")) return;
        sessions = sessions.filter(s => s.id !== id);
        if (sessions.length === 0) createEmptySession();
        else if (currentSessionId === id) currentSessionId = sessions[0].id;
        saveData();
        renderSidebar();
        renderChat();
    }

    function renderSidebar() {
        sessionListEl.innerHTML = '';
        sessions.forEach(s => {
            const div = document.createElement('div');
            div.className = `session-item ${s.id === currentSessionId ? 'active' : ''}`;
            div.onclick = () => switchSession(s.id);
            div.innerHTML = `<span class="title">\({escapeHTML(s.title)}</span><button class="delete-btn" onclick="deleteSession(event, '\){s.id}')">✖</button>`;
            sessionListEl.appendChild(div);
        });
    }

    function renderChat() {
        chatContainer.innerHTML = '';
        const session = sessions.find(s => s.id === currentSessionId);
        if (!session) return;
        if (session.messages.length === 0) {
            chatContainer.innerHTML = '<div style="text-align:center; color:#999; margin-top:40px; font-size:14px;">发送一条消息开始对话</div>';
            return;
        }
        session.messages.forEach(msg => appendBubble(msg.role, msg.content, false));
        scrollToBottom();
    }

    function appendBubble(role, text, isHTML = false) {
        if (chatContainer.innerHTML.includes("发送一条消息开始对话")) chatContainer.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        
        if (isHTML) bubble.innerHTML = text;
        else bubble.innerHTML = escapeHTML(text).replace(/\n/g, '<br>');
        
        wrapper.appendChild(bubble);
        chatContainer.appendChild(wrapper);
        scrollToBottom();
        return bubble;
    }

    function scrollToBottom() {
        setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 50);
    }

    async function sendMessage() {
        if (isGenerating) return; 
        const text = inputEl.value.trim();
        if (!text) return;

        let session = sessions.find(s => s.id === currentSessionId);
        if (!session) return;

        isGenerating = true;
        inputEl.value = '';
        inputEl.style.height = 'auto';
        inputEl.disabled = true;
        sendBtn.disabled = true;

        if (session.title === '新会话') {
            session.title = safeSliceTitle(text);
            renderSidebar();
        }
        
        session.messages.push({ role: 'user', content: text });
        appendBubble('user', text);
        saveData();

        const loadingHTML = `<div class="loading-container"><div class="spinner"></div> 正在思考中...</div>`;
        const aiBubble = appendBubble('ai', loadingHTML, true);
        
        let promptText = "";
        session.messages.slice(-5).forEach(m => { promptText += `\({m.role === 'user' ? '用户' : 'AI'}: \){m.content}\n`; });
        promptText += "AI:";

        const selectedModel = document.getElementById('model-select').value;
        const activeReqSessionId = currentSessionId; 

        try {
            const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("网络拥堵或服务器未响应，请重试")), 15000));
            const chatPromise = puter.ai.chat(promptText, { model: selectedModel, stream: true });
            
            const stream = await Promise.race([chatPromise, timeoutPromise]);

            let fullText = '';
            let isFirstChunk = true; 

            for await (const part of stream) {
                if (currentSessionId !== activeReqSessionId) break; 
                if (part && part.text) {
                    if (isFirstChunk) { aiBubble.innerHTML = ''; isFirstChunk = false; }
                    fullText += part.text;
                    aiBubble.innerHTML = escapeHTML(fullText).replace(/\n/g, '<br>');
                    scrollToBottom();
                }
            }
            
            if (currentSessionId === activeReqSessionId) {
                if (!fullText) fullText = "（API无数据返回）";
                if (isFirstChunk) aiBubble.innerHTML = escapeHTML(fullText);
                session.messages.push({ role: 'ai', content: fullText });
                saveData();
            }

        } catch (error) {
            console.error("请求报错:", error);
            if (currentSessionId === activeReqSessionId) {
                const errMsg = `[系统提示: ${error.message}]`;
                aiBubble.innerHTML = `<div class="sys-text">${errMsg}</div>`; 
                session.messages.push({ role: 'ai', content: errMsg });
                saveData();
            }
        } finally {
            if (currentSessionId === activeReqSessionId) {
                isGenerating = false;
                inputEl.disabled = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }
    }

    function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
    }

    inputEl.addEventListener('input', function() {
        this.style.height = 'auto'; this.style.height = (this.scrollHeight < 100 ? this.scrollHeight : 100) + 'px';
    });
    inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if(!sendBtn.disabled) sendMessage(); }
    });

    window.onload = init;
</script>
</body>
    </html>
