<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Gemini 3.1 Pro 体验页面</title>
    <!-- 引入 Puter.js -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        #output { border: 1px solid #ccc; padding: 15px; margin-top: 20px; min-height: 100px; white-space: pre-wrap; background: #f9f9f9; }
        textarea { width: 100%; height: 100px; }
    </style>
</head>
<body>

    <h1>使用 Gemini 3.1 Pro</h1>
    <textarea id="userInput" placeholder="输入你的问题..."></textarea>
    <br><br>
    <button id="sendBtn" disabled>正在加载 Puter...</button>

    <div id="output">请等待页面加载完成...</div>

    <script>
        // 检查 puter 是否加载成功
        const checkPuter = setInterval(() => {
            if (typeof puter !== 'undefined') {
                clearInterval(checkPuter);
                const btn = document.getElementById('sendBtn');
                btn.disabled = false;
                btn.innerText = "发送给 Gemini 3.1";
                btn.onclick = askGemini;
                document.getElementById('output').innerText = "已就绪，请输入问题。";
            }
        }, 500);

        async function askGemini() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            
            if (!input) return alert("请输入内容");

            output.innerText = "正在思考中...";

            try {
                // 如果未登录，这行代码会触发 Puter 的登录弹窗
                const response = await puter.ai.chat(input, { 
                    model: 'gemini-3.1-pro-preview' 
                });
                output.innerText = response;
            } catch (error) {
                console.error(error);
                output.innerText = "出错了: " + (error.message || "未知错误，请检查控制台");
            }
        }
    </script>
</body>
</html>
